<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odyssey of Life — An Interactive Human Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --warm-white: #f5f2ec;
      --ink: #1a1612;
      --ink-light: #3d3530;
      --ink-muted: #8a7e74;
      --gold: #c4995a;
      --gold-light: #e8d5b0;
      --rose: #c9756a;
      --sage: #7a9e8a;
      --sky: #6a8fb0;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.3s, height 0.3s, background 0.3s;
      mix-blend-mode: multiply;
    }
    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid var(--ink-muted);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease-out, width 0.3s, height 0.3s, border-color 0.3s;
    }
    body:has(a:hover) #cursor, body:has(button:hover) #cursor { width: 20px; height: 20px; background: var(--gold); }
    body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring { width: 52px; height: 52px; border-color: var(--gold); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--warm-white); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 48px;
      mix-blend-mode: multiply;
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links {
      display: flex; gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* Progress bar */
    #progress-bar {
      position: fixed; top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* SECTIONS */
    section { position: relative; }

    /* ─── HERO ─── */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
      padding: 0 10vw;
      background: var(--cream);
      overflow: hidden;
    }
    .hero-bg-line {
      position: absolute;
      top: 0; right: 12vw;
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--gold-light), transparent);
      opacity: 0.6;
    }
    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.9s 0.3s forwards;
    }
    .hero-title {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 9vw, 8rem);
      font-weight: 300;
      line-height: 1.0;
      color: var(--ink);
      max-width: 700px;
      opacity: 0;
      animation: fadeUp 1s 0.5s forwards;
    }
    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }
    .hero-sub {
      margin-top: 32px;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--ink-muted);
      max-width: 420px;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }
    .hero-scroll-hint {
      position: absolute;
      bottom: 48px; left: 10vw;
      display: flex; align-items: center; gap: 16px;
      opacity: 0;
      animation: fadeUp 1s 1.2s forwards;
    }
    .hero-scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .scroll-line {
      width: 60px; height: 1px;
      background: var(--gold);
      animation: expandLine 1.5s 1.5s ease-in-out forwards;
      transform-origin: left;
      transform: scaleX(0);
    }
    .hero-number {
      position: absolute;
      right: 10vw; bottom: 48px;
      font-family: var(--serif);
      font-size: clamp(6rem, 15vw, 13rem);
      font-weight: 300;
      color: var(--gold-light);
      line-height: 1;
      user-select: none;
      opacity: 0;
      animation: fadeIn 1.5s 1s forwards;
    }

    /* ─── INTRO ─── */
    #intro {
      min-height: 100vh;
      display: flex; align-items: center;
      background: var(--ink);
      padding: 10vh 10vw;
    }
    .intro-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      width: 100%;
    }
    .intro-left {}
    .intro-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
    }
    .intro-heading {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 5vw, 4.5rem);
      font-weight: 300;
      color: var(--cream);
      line-height: 1.1;
    }
    .intro-heading em { font-style: italic; color: var(--gold); }
    .intro-right {}
    .intro-body {
      font-size: 1.05rem;
      line-height: 1.9;
      color: #a09880;
    }
    .intro-body p + p { margin-top: 20px; }
    .intro-quote {
      margin-top: 40px;
      padding-left: 20px;
      border-left: 2px solid var(--gold);
      font-family: var(--serif);
      font-size: 1.3rem;
      font-style: italic;
      color: var(--cream);
      line-height: 1.6;
    }

    /* ─── EXPLORATION / CHAPTERS ─── */
    #exploration {
      background: var(--warm-white);
      padding: 12vh 10vw;
    }
    .section-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 80px;
      border-bottom: 1px solid var(--gold-light);
      padding-bottom: 24px;
    }
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .section-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      color: var(--ink);
    }
    .section-count {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink-muted);
    }
    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .chapter-card {
      background: var(--cream);
      padding: 48px 40px;
      cursor: pointer;
      transition: background 0.4s, transform 0.4s;
      position: relative;
      overflow: hidden;
    }
    .chapter-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .chapter-card:hover::before { transform: scaleX(1); }
    .chapter-card:hover { background: white; transform: translateY(-4px); }
    .chapter-num {
      font-family: var(--serif);
      font-size: 3.5rem;
      font-weight: 300;
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: 16px;
    }
    .chapter-stage {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .chapter-name {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .chapter-desc {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--ink-muted);
    }
    .chapter-icon {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    /* ─── INSIGHT / TIMELINE ─── */
    #insight {
      background: var(--cream);
      padding: 12vh 10vw;
      position: relative;
    }
    .timeline {
      position: relative;
      margin-top: 60px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold), var(--gold-light));
      transform: translateX(-50%);
    }
    .timeline-item {
      display: flex;
      gap: 60px;
      align-items: flex-start;
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .timeline-item.visible { opacity: 1; transform: translateY(0); }
    .timeline-item:nth-child(odd) { flex-direction: row; padding-right: calc(50% + 30px); }
    .timeline-item:nth-child(even) { flex-direction: row-reverse; padding-left: calc(50% + 30px); }
    .timeline-dot {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 12px;
      background: var(--gold);
      border-radius: 50%;
      border: 3px solid var(--cream);
      box-shadow: 0 0 0 1px var(--gold);
    }
    .timeline-content {
      background: white;
      padding: 32px;
      border-radius: 2px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.04);
      flex: 1;
      position: relative;
    }
    .timeline-year {
      font-family: var(--serif);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .timeline-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .timeline-text {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--ink-muted);
    }
    .timeline-emoji {
      font-size: 1.8rem;
      margin-bottom: 12px;
      display: block;
    }

    /* ─── CONCLUSION ─── */
    #conclusion {
      min-height: 90vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center;
      background: var(--ink);
      padding: 10vh 10vw;
      position: relative;
      overflow: hidden;
    }
    .conclusion-bg-circle {
      position: absolute;
      width: 600px; height: 600px;
      border: 1px solid rgba(196,153,90,0.15);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: rotateSlow 30s linear infinite;
    }
    .conclusion-bg-circle:nth-child(2) { width: 400px; height: 400px; animation-direction: reverse; animation-duration: 20s; }
    .conclusion-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
    }
    .conclusion-title {
      font-family: var(--serif);
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 300;
      color: var(--cream);
      line-height: 1.05;
      max-width: 700px;
      margin-bottom: 32px;
    }
    .conclusion-title em { font-style: italic; color: var(--gold); }
    .conclusion-body {
      font-size: 1rem;
      line-height: 1.9;
      color: #a09880;
      max-width: 560px;
      margin-bottom: 56px;
    }
    .cta-button {
      display: inline-flex; align-items: center; gap: 16px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--sans);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 16px 40px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .cta-button:hover { background: var(--gold); color: var(--ink); }
    .cta-arrow { transition: transform 0.3s; }
    .cta-button:hover .cta-arrow { transform: translateX(4px); }

    /* Interactive stats */
    .stats-row {
      display: flex; gap: 80px; justify-content: center;
      margin-top: 80px;
      position: relative; z-index: 1;
    }
    .stat-item { text-align: center; }
    .stat-number {
      font-family: var(--serif);
      font-size: 3rem;
      font-weight: 300;
      color: var(--cream);
      display: block;
    }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ─── INTERACTIVE SLIDERS ─── */
    .life-slider-section {
      background: var(--warm-white);
      padding: 10vh 10vw;
    }
    .sliders-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin-top: 60px;
    }
    .life-slider {
      padding: 40px;
      background: white;
      border-radius: 2px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    }
    .slider-label {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .slider-sublabel {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-bottom: 24px;
    }
    .slider-track { position: relative; }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 2px;
      background: var(--gold-light);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      background: var(--gold);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    .slider-value {
      font-family: var(--serif);
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--gold);
      text-align: right;
    }
    .slider-reflection {
      margin-top: 16px;
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--ink-muted);
      font-style: italic;
      min-height: 48px;
      transition: opacity 0.3s;
    }

    /* Hover cards */
    .hover-cards-row {
      display: flex; gap: 16px;
      margin-top: 32px;
    }
    .hover-card {
      flex: 1;
      padding: 24px 20px;
      background: var(--warm-white);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s, background 0.3s;
      text-align: center;
    }
    .hover-card:hover {
      border-color: var(--gold);
      transform: translateY(-6px);
      background: white;
    }
    .hover-card-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
    .hover-card-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* FOOTER */
    footer {
      background: var(--ink);
      padding: 40px 10vw;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-brand {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--cream);
    }
    .footer-note {
      font-size: 0.75rem;
      color: var(--ink-muted);
    }

    /* Loading screen */
    #loader {
      position: fixed; inset: 0;
      background: var(--ink);
      z-index: 1000;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.8s, visibility 0.8s;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-text {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--cream);
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.8s 0.3s forwards;
    }
    .loader-text em { font-style: italic; color: var(--gold); }
    .loader-bar-wrap {
      width: 200px; height: 1px;
      background: rgba(255,255,255,0.1);
      margin-top: 32px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.5s 0.5s forwards;
    }
    .loader-bar {
      height: 100%;
      background: var(--gold);
      width: 0%;
      animation: loadProgress 2s 0.6s ease-out forwards;
    }

    /* Parallax image placeholder */
    .parallax-image {
      width: 100%; height: 320px;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--cream) 60%, var(--sage) 100%);
      position: relative;
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }
    .parallax-inner {
      font-family: var(--serif);
      font-size: clamp(4rem, 12vw, 10rem);
      color: rgba(196,153,90,0.15);
      font-weight: 300;
      user-select: none;
      transform: translateY(var(--parallax-y, 0px));
      transition: transform 0.05s linear;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes expandLine {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }
    @keyframes loadProgress {
      from { width: 0%; }
      to   { width: 100%; }
    }
    @keyframes rotateSlow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes floatUp {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* Reveal on scroll */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* Sticky chapter label */
    .sticky-label {
      position: sticky;
      top: 80px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      z-index: 10;
      mix-blend-mode: multiply;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      #hero { padding: 0 6vw; }
      .intro-inner { grid-template-columns: 1fr; gap: 40px; }
      .chapters-grid { grid-template-columns: 1fr; }
      .sliders-grid { grid-template-columns: 1fr; }
      .timeline::before { left: 20px; }
      .timeline-item:nth-child(odd),
      .timeline-item:nth-child(even) {
        flex-direction: row;
        padding-right: 0;
        padding-left: 52px;
      }
      .timeline-dot { left: 20px; }
      .stats-row { flex-direction: column; gap: 32px; }
      .hover-cards-row { flex-wrap: wrap; }
      footer { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-text">The <em>Odyssey</em><br/>of a Human Life</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
</div>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Progress bar -->
<div id="progress-bar" style="width:0%"></div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── DATA ── */
const chapters = [
  { num:"01", stage:"Chapter One", name:"The Dawn", desc:"Before language, before memory — the first breath, the first cry. We arrive unwritten, ready for the world to inscribe its stories upon us.", icon:"🌅", color:"#e8d5b0" },
  { num:"02", stage:"Chapter Two", name:"The Bloom", desc:"Childhood is the universe in miniature. Each puddle is an ocean, each stranger a possibility, each day a lifetime compressed into wonder.", icon:"🌸", color:"#f0d4cf" },
  { num:"03", stage:"Chapter Three", name:"The Search", desc:"Youth asks the hardest question: Who am I? The answer is never simple, never final — always forming at the intersection of dreams and experience.", icon:"🔭", color:"#d4e0d4" },
  { num:"04", stage:"Chapter Four", name:"The Build", desc:"We construct lives the way architects build cities — with intention and accident, with love and pragmatism, brick by chosen brick.", icon:"🏛️", color:"#d4dce8" },
  { num:"05", stage:"Chapter Five", name:"The Return", desc:"In the final passages of life, we circle back — to wonder, to simplicity, to the essential questions that outlasted all our answers.", icon:"🌙", color:"#e8e4d4" },

/* ── SLIDER COMPONENT ── */
function LifeSlider({ data }) {
  const [value, setValue] = useState(data.default);
  const getReflection = (v) => {
    if (v < 35) return data.reflections.low;
    if (v < 65) return data.reflections.mid;
    return data.reflections.high;
  };
  return (
    <div className="life-slider">
      <div className="slider-label">{data.label}</div>
      <div className="slider-sublabel">{data.sublabel}</div>
      <div className="slider-value">{value}</div>
      <div className="slider-track">
        <input type="range" min={data.min} max={data.max} value={value}
          onChange={e => setValue(Number(e.target.value))} />
      </div>
      <div className="slider-reflection">{getReflection(value)}</div>
    </div>
  );
}

/* ── CHAPTER CARD ── */
function ChapterCard({ ch, index }) {

  return (

/* ── HOVER CARD ── */
function HoverCard({ card }) {
  const [active, setActive] = useState(false);
  return (

}

/* ── TIMELINE ITEM ── */
function TimelineItem({ item, index }) {
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { ref.current.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.2 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div className="timeline-item" ref={ref} style={{ transitionDelay: `${index * 0.1}s` }}>
      <div className="timeline-dot"></div>
      <div className="timeline-content">
        <span className="timeline-emoji">{item.emoji}</span>
        <div className="timeline-year">{item.year}</div>
        <div className="timeline-title">{item.title}</div>
        <div className="timeline-text">{item.text}</div>
      </div>
    </div>
  );
}

/* ── ANIMATED COUNTER ── */
function Counter({ target, suffix="" }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        let start = 0;
        const step = target / 60;
        const timer = setInterval(() => {
          start += step;
          if (start >= target) { setCount(target); clearInterval(timer); }
          else setCount(Math.floor(start));
        }, 16);
      }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref} className="stat-number">{count}{suffix}</span>;
}

/* ── PARALLAX SECTION ── */
function ParallaxBanner({ text }) {
  const ref = useRef(null);
  const [y, setY] = useState(0);
  useEffect(() => {
    const handle = () => {
      if (!ref.current) return;
      const rect = ref.current.getBoundingClientRect();
      const center = rect.top + rect.height / 2 - window.innerHeight / 2;
      setY(center * 0.25);
    };
    window.addEventListener('scroll', handle, { passive: true });
    return () => window.removeEventListener('scroll', handle);
  }, []);
  return (
    <div className="parallax-image" ref={ref}>
      <div className="parallax-inner" style={{ transform: `translateY(${y}px)` }}>{text}</div>
    </div>
  );
}

      cursor.style.top = e.clientY + 'px';

      ring.style.top = ry + 'px';
